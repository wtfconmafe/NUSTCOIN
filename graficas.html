<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estadísticas - Nustcoin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="graficas.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <h1 class="header-title">Estadísticas</h1>
            <div class="header-icons">
                <div class="icon-wrapper"><i class="fa-solid fa-calendar-days"></i></div>
            </div>
        </header>

        <main class="content-wrapper">
            <section class="chart-container">
                <h3 class="section-subtitle">Gastos por Categoría</h3>
                <canvas id="myChart"></canvas>
            </section>

            <section class="summary-section">
                <h3 class="section-subtitle">Resumen del Mes</h3>
                <div class="summary-card">
                    <div class="summary-item">
                        <span>Más gastado en:</span>
                        <strong>Comida</strong>
                    </div>
                    <div class="summary-item">
                        <span>Total Gastos:</span>
                        <strong class="expense-text">-$2,300.00</strong>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-navigation">
            <div class="nav-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-house"></i></div>
            <div class="nav-btn active"><i class="fa-solid fa-chart-line"></i></div>
            
            <div class="nav-btn main-money-btn" onclick="window.location.href='registrodegastos.html'">
                <i class="fa-solid fa-dollar-sign"></i>
            </div>
            
            <div class="nav-btn"><i class="fa-solid fa-leaf"></i></div>
            <div class="nav-btn" onclick="window.location.href='notificaciones.html'"><i class="fa-solid fa-bell"></i></div>
        </nav>
    </div>

    <script src="script-graficas.js"></script>
</body>
</html>
